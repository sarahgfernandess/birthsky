<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BirthSky</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
        radial-gradient(circle at 20% 30%, rgba(123,47,247,0.4), transparent 25%),
        radial-gradient(circle at 80% 20%, rgba(0,191,255,0.3), transparent 30%),
        radial-gradient(circle at 50% 80%, rgba(255,0,255,0.2), transparent 30%),
        linear-gradient(135deg,#050510,#0d0221,#1a0933);
    color:white;
}

.card{
    width:380px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);
    padding:30px;
    border-radius:20px;
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:10px;
    border:none;
    border-radius:10px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#7b2ff7;
    color:white;
    cursor:pointer;
}

#resultado{
    margin-top:15px;
}
</style>
</head>

<body>

<div class="card">
    <h1>🌌 BirthSky</h1>

    <input type="date" id="data">
    <input type="time" id="hora">
    <input type="text" id="local" placeholder="Cidade">

    <button onclick="gerar()">Gerar céu</button>

    <div id="resultado"></div>
</div>

<script>
function gerar(){
    const data = document.getElementById("data").value;
    const hora = document.getElementById("hora").value;
    const local = document.getElementById("local").value;

    if(!data || !hora || !local){
        document.getElementById("resultado").innerHTML = "Preencha tudo.";
        return;
    }

    // TESTE pra garantir que está funcionando
    alert("Abrindo mapa...");

    const url = "https://stellarium-web.org/";

    window.open(url, "_blank");
}
</script>

</body>
</html>
